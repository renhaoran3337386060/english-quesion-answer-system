<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开始练习 - 英语练习工具</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/practice.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- 左侧导航 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">📚</span>
                    <span class="logo-text">英语练习</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="banks.html" class="nav-item">
                    <span class="nav-icon">📁</span>
                    <span>题库管理</span>
                </a>
                <a href="practice.html" class="nav-item active">
                    <span class="nav-icon">✏️</span>
                    <span>开始练习</span>
                </a>
                <a href="records.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>练习记录</span>
                </a>
                <a href="stats.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span>学习统计</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="page-header">
                <h1>开始练习</h1>
            </div>
            
            <!-- 选择题库 -->
            <div id="practice-select" class="practice-select">
                <h3>选择题库</h3>
                <div id="practice-banks" class="practice-banks">
                    <!-- 题库列表动态加载 -->
                </div>
            </div>
            
            <!-- 练习区域 -->
            <div id="practice-area" class="practice-container hidden">
                <!-- 练习内容动态加载 -->
            </div>
        </main>
    </div>

    <script src="js/common.js"></script>
    <script src="js/practice.js"></script>
</body>
</html>
