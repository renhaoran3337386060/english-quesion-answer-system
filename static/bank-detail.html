<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库详情 - 英语练习工具</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/banks.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- 左侧导航 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">📚</span>
                    <span class="logo-text">英语练习</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span>首页</span>
                </a>
                <a href="banks.html" class="nav-item active">
                    <span class="nav-icon">📁</span>
                    <span>题库管理</span>
                </a>
                <a href="practice.html" class="nav-item">
                    <span class="nav-icon">✏️</span>
                    <span>开始练习</span>
                </a>
                <a href="records.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span>练习记录</span>
                </a>
                <a href="stats.html" class="nav-item">
                    <span class="nav-icon">📈</span>
                    <span>学习统计</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="bank-detail-header">
                <button class="btn btn-icon" onclick="location.href='banks.html'">←</button>
                <h1 id="bank-title">题库详情</h1>
                <button class="btn btn-primary" onclick="openQuestionModal()">
                    <span>+ 添加题目</span>
                </button>
            </div>
            
            <div id="bank-info" class="bank-info-card">
                <!-- 题库信息动态加载 -->
            </div>
            
            <div id="questions-list" class="questions-list">
                <!-- 题目列表动态加载 -->
            </div>
        </main>
    </div>

    <!-- 添加题目弹窗 -->
    <div id="question-modal" class="modal hidden">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>添加题目</h3>
                <button class="modal-close" onclick="closeQuestionModal()">×</button>
            </div>
            <div class="modal-body" id="question-form">
                <!-- 动态表单内容 -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeQuestionModal()">取消</button>
                <button class="btn btn-primary" onclick="saveQuestion()">保存</button>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/bank-detail.js"></script>
</body>
</html>
