<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语翻译练习工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .input-section {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .input-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-section h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            resize: vertical;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .practice-section {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }

        .practice-section.active {
            display: block;
        }

        .practice-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .sentence-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .english-text {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .translation-mask {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: transparent;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
            text-align: center;
            font-size: 14px;
        }

        .translation-mask:hover {
            opacity: 0.9;
        }

        .translation-mask.revealed {
            background: #e8f5e9;
            color: #2e7d32;
            cursor: default;
            user-select: text;
        }

        .translation-mask::before {
            content: '点击显示翻译';
            color: white;
            font-weight: 500;
        }

        .translation-mask.revealed::before {
            content: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stats {
            background: #f0f0f0;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .stat-value {
            color: #667eea;
            font-weight: bold;
            font-size: 18px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .tips {
            background: #fff3e0;
            border-radius: 10px;
            padding: 15px 20px;
            margin-top: 20px;
        }

        .tips h3 {
            color: #e65100;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .tips ul {
            color: #666;
            font-size: 13px;
            padding-left: 18px;
        }

        .tips li {
            margin-bottom: 5px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .input-section, .practice-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>英语翻译练习工具</h1>
        
        <div class="input-section">
            <h2>输入文章</h2>
            
            <div class="input-group">
                <label for="englishInput">英文原文（每句一行，或用句号分隔）</label>
                <textarea id="englishInput" placeholder="请输入英文原文...
例如：
The quick brown fox jumps over the lazy dog.
This is a sample sentence for translation practice.
Learning English requires consistent effort and dedication."></textarea>
            </div>
            
            <div class="input-group">
                <label for="chineseInput">中文翻译（每句一行，与英文对应）</label>
                <textarea id="chineseInput" placeholder="请输入中文翻译...
例如：
那只敏捷的棕色狐狸跳过了那只懒狗。
这是一个用于翻译练习的例句。
学习英语需要持之以恒的努力和奉献。"></textarea>
            </div>
            
            <button class="btn" onclick="startPractice()">开始练习</button>
            
            <div class="tips">
                <h3>使用提示</h3>
                <ul>
                    <li>将英文原文和中文翻译分别输入到上方文本框中</li>
                    <li>每句英文对应一行中文翻译</li>
                    <li>点击"开始练习"后，系统会逐句显示英文，隐藏中文翻译</li>
                    <li>点击被遮盖的翻译区域即可查看答案</li>
                </ul>
            </div>
        </div>
        
        <div class="practice-section" id="practiceSection">
            <h2>翻译练习</h2>
            
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">总句数：</span>
                    <span class="stat-value" id="totalCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">已查看：</span>
                    <span class="stat-value" id="revealedCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">未查看：</span>
                    <span class="stat-value" id="hiddenCount">0</span>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn" onclick="revealAll()">显示全部翻译</button>
                <button class="btn btn-secondary" onclick="hideAll()">隐藏全部翻译</button>
                <button class="btn btn-secondary" onclick="resetPractice()">重新开始</button>
            </div>
            
            <div id="sentencesContainer"></div>
        </div>
    </div>

    <script>
        let sentences = [];

        function splitIntoSentences(text) {
            // 按行分割，如果行数太少则按句号分割
            let lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            
            if (lines.length <= 1 && text.includes('。')) {
                // 尝试按中文句号分割
                lines = text.split('。').map(line => line.trim()).filter(line => line.length > 0);
            }
            
            if (lines.length <= 1 && text.includes('.')) {
                // 尝试按英文句号分割
                lines = text.split('.').map(line => line.trim()).filter(line => line.length > 0);
                lines = lines.map(line => line + '.');
            }
            
            return lines;
        }

        function startPractice() {
            const englishText = document.getElementById('englishInput').value.trim();
            const chineseText = document.getElementById('chineseInput').value.trim();
            
            if (!englishText || !chineseText) {
                alert('请输入英文原文和中文翻译！');
                return;
            }
            
            const englishSentences = splitIntoSentences(englishText);
            const chineseSentences = splitIntoSentences(chineseText);
            
            if (englishSentences.length !== chineseSentences.length) {
                alert(`英文句子数 (${englishSentences.length}) 与中文句子数 (${chineseSentences.length}) 不匹配，请检查输入！`);
                return;
            }
            
            sentences = englishSentences.map((eng, index) => ({
                english: eng,
                chinese: chineseSentences[index],
                revealed: false
            }));
            
            renderSentences();
            updateStats();
            
            document.getElementById('practiceSection').classList.add('active');
            document.getElementById('practiceSection').scrollIntoView({ behavior: 'smooth' });
        }

        function renderSentences() {
            const container = document.getElementById('sentencesContainer');
            
            if (sentences.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>暂无练习内容</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = sentences.map((item, index) => `
                <div class="sentence-item">
                    <div class="english-text">${index + 1}. ${escapeHtml(item.english)}</div>
                    <div class="translation-mask ${item.revealed ? 'revealed' : ''}" 
                         onclick="toggleTranslation(${index})"
                         ${item.revealed ? '' : 'title="点击显示翻译"'}>
                        ${item.revealed ? escapeHtml(item.chinese) : ''}
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleTranslation(index) {
            sentences[index].revealed = !sentences[index].revealed;
            renderSentences();
            updateStats();
        }

        function revealAll() {
            sentences.forEach(item => item.revealed = true);
            renderSentences();
            updateStats();
        }

        function hideAll() {
            sentences.forEach(item => item.revealed = false);
            renderSentences();
            updateStats();
        }

        function resetPractice() {
            if (confirm('确定要重新开始吗？当前进度将丢失。')) {
                sentences.forEach(item => item.revealed = false);
                renderSentences();
                updateStats();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function updateStats() {
            const total = sentences.length;
            const revealed = sentences.filter(item => item.revealed).length;
            const hidden = total - revealed;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('revealedCount').textContent = revealed;
            document.getElementById('hiddenCount').textContent = hidden;
        }

        // 支持 Ctrl+Enter 快速开始
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                startPractice();
            }
        });
    </script>
</body>
</html>
