name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          tar \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses6 \
          libncursesw6 \
          cmake \
          libffi-dev \
          libssl-dev \
          automake \
          openjdk-17-jdk

    - name: Install buildozer
      run: |
        pip3 install buildozer cython

    - name: Build Android with Buildozer
      run: |
        # 1. 初始化SDK目录（核心修复）
        buildozer android setup || true
        
        # 2. 进入SDK路径
        cd /home/runner/.buildozer/android/platform/android-sdk/
        
        # 3. 接受许可证
        while true; do echo "y"; sleep 1; done | cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        
        # 4. 安装构建工具
        cmdline-tools/latest/bin/sdkmanager --install "build-tools;34.0.0"
        
        # 5. 验证安装
        ls -la /home/runner/.buildozer/android/platform/android-sdk/build-tools/
        
        # 6. 构建
        cd $GITHUB_WORKSPACE
        buildozer android clean
        buildozer android debug
      timeout-minutes: 180
      env:
        JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          Android APK自动构建
          构建时间: ${{ github.event.head_commit.timestamp }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
